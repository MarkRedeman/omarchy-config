# Alacritty configuration (TOML format, requires Alacritty 0.13+)
# Omarchy applies theme colors via ~/.config/omarchy/current/theme/alacritty.toml

general.import = [ "~/.config/omarchy/current/theme/alacritty.toml" ]

[env]
TERM = "xterm-256color"

[font]
normal = { family = "Intel One Mono" }
bold = { family = "Intel One Mono" }
italic = { family = "Intel One Mono" }
size = 9

[window]
padding.x = 14
padding.y = 14
decorations = "None"

[keyboard]
bindings = [
{ key = "Insert", mods = "Shift", action = "Paste" },
{ key = "Insert", mods = "Control", action = "Copy" },
  { key = "Return", mods = "Shift", chars = "\u001B\r" }
]

[terminal]
osc52 = "CopyPaste"
