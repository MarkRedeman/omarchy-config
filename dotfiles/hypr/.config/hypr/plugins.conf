# hy3 plugin configuration (i3-style tiling)
# Installed via: hyprpm add https://github.com/outfoxxed/hy3
# Loaded via: exec-once = hyprpm reload -n (in autostart.conf)
#
# No "plugin = /usr/lib/libhy3.so" needed — hyprpm handles loading.
# See: https://github.com/outfoxxed/hy3

plugin {
    hy3 {
        # Keep nested group only if parent is a tab group
        node_collapse_policy = 2

        # Offset from group split when only one window in a group
        group_inset = 10

        # Tab group appearance (cyan highlight style)
        tabs {
            height = 22
            padding = 6
            from_top = false
            radius = 6
            border_width = 2
            render_text = true
            text_center = true
            text_font = "Sans"
            text_height = 8
            text_padding = 3

            # Active tab (focused tab in focused container)
            col.active = rgba(33ccff40)
            col.active.border = rgba(33ccffee)
            col.active.text = rgba(ffffffff)

            # Active tab on unfocused monitor
            col.active_alt_monitor = rgba(60606040)
            col.active_alt_monitor.border = rgba(808080ee)
            col.active_alt_monitor.text = rgba(ffffffff)

            # Focused node in unfocused container
            col.focused = rgba(60606040)
            col.focused.border = rgba(808080ee)
            col.focused.text = rgba(ffffffff)

            # Inactive tab
            col.inactive = rgba(30303020)
            col.inactive.border = rgba(606060aa)
            col.inactive.text = rgba(ffffffff)

            # Urgent tab
            col.urgent = rgba(ff223340)
            col.urgent.border = rgba(ff2233ee)
            col.urgent.text = rgba(ffffffff)

            # Locked tab
            col.locked = rgba(90903340)
            col.locked.border = rgba(909033ee)
            col.locked.text = rgba(ffffffff)

            blur = true
            opacity = 1.0
        }

        autotile {
            enable = false
        }
    }
}
