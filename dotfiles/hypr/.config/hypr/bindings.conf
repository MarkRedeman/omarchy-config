# =============================================================================
# Keybindings
# =============================================================================
# These bindings are modeled after an i3wm configuration, adapted for
# Hyprland with the hy3 plugin for i3/sway-like manual tiling.
#
# All keybindings live here. The omarchy-defaults.conf file only contains
# non-binding configuration (autostart, env vars, look-and-feel, window rules).
# =============================================================================


# =============================================================================
# Variables
# =============================================================================
$terminal = uwsm-app -- xdg-terminal-exec
$browser = omarchy-launch-browser
$osdclient = swayosd-client --monitor "$(hyprctl monitors -j | jq -r '.[] | select(.focused == true).name')"


# =============================================================================
# Application Launchers
# =============================================================================
# Convention: all app launchers use SUPER+ALT + letter.
# Exceptions: SUPER+RETURN (terminal) and SUPER+D (app launcher) match i3.
# =============================================================================

# Terminal (i3: $mod+Return)
bindd = SUPER, RETURN, Terminal, exec, $terminal --working-directory="$(omarchy-cmd-terminal-cwd)"
bindd = SUPER ALT, RETURN, Tmux, exec, uwsm-app -- xdg-terminal-exec --dir="$(omarchy-cmd-terminal-cwd)" tmux new

# App launcher (i3: $mod+d via rofi)
bindd = SUPER, D, Launch apps, exec, omarchy-launch-walker

# Browser
bindd = SUPER ALT, B, Browser, exec, $browser
bindd = SUPER ALT SHIFT, B, Browser (private), exec, $browser --private

# File manager
bindd = SUPER ALT, F, File manager, exec, uwsm-app -- nautilus --new-window
bindd = SUPER ALT SHIFT, F, File manager (cwd), exec, uwsm-app -- nautilus --new-window "$(omarchy-cmd-terminal-cwd)"

# Editor
bindd = SUPER ALT, E, Editor, exec, omarchy-launch-editor

# Music
bindd = SUPER ALT, M, Music, exec, omarchy-launch-or-focus spotify

# Docker
bindd = SUPER ALT, D, Docker, exec, omarchy-launch-tui lazydocker

# Web apps
#bindd = SUPER ALT, W, WhatsApp, exec, omarchy-launch-or-focus-webapp WhatsApp "https://web.whatsapp.com/"

# Uncomment to enable additional app launchers:
#bindd = SUPER ALT, A, ChatGPT, exec, omarchy-launch-webapp "https://chatgpt.com"
#bindd = SUPER ALT SHIFT, A, Grok, exec, omarchy-launch-webapp "https://grok.com"
#bindd = SUPER ALT, Y, YouTube, exec, omarchy-launch-webapp "https://youtube.com/"
#bindd = SUPER ALT, SLASH, Passwords, exec, uwsm-app -- 1password

# Password store (TODO: walker pass integration, see pass.md)
#bindd = SUPER ALT, P, Passwords (pass), exec, omarchy-launch-walker -m pass


# =============================================================================
# Window Management (i3-style with hy3)
# =============================================================================

# Close window (i3: $mod+Shift+q)
bindd = SUPER SHIFT, Q, Close window, killactive,

# Focus (i3: $mod+h/j/k/l)
bindd = SUPER, H, Move focus left, hy3:movefocus, l
bindd = SUPER, J, Move focus down, hy3:movefocus, d
bindd = SUPER, K, Move focus up, hy3:movefocus, u
bindd = SUPER, L, Move focus right, hy3:movefocus, r

# Focus with arrow keys
bindd = SUPER, LEFT, Move focus left, hy3:movefocus, l
bindd = SUPER, RIGHT, Move focus right, hy3:movefocus, r
bindd = SUPER, UP, Move focus up, hy3:movefocus, u
bindd = SUPER, DOWN, Move focus down, hy3:movefocus, d

# Move window (i3: $mod+Shift+h/j/k/l)
bindd = SUPER SHIFT, H, Move window left, hy3:movewindow, l
bindd = SUPER SHIFT, J, Move window down, hy3:movewindow, d
bindd = SUPER SHIFT, K, Move window up, hy3:movewindow, u
bindd = SUPER SHIFT, L, Move window right, hy3:movewindow, r

# Move window with arrow keys
bindd = SUPER SHIFT, LEFT, Move window left, hy3:movewindow, l
bindd = SUPER SHIFT, RIGHT, Move window right, hy3:movewindow, r
bindd = SUPER SHIFT, UP, Move window up, hy3:movewindow, u
bindd = SUPER SHIFT, DOWN, Move window down, hy3:movewindow, d

# Fullscreen (i3: $mod+f)
bindd = SUPER, F, Full screen, fullscreen, 0

# Split orientation (i3: $mod+v / $mod+Shift+v)
bindd = SUPER SHIFT, V, Toggle split direction, hy3:makegroup, opposite

# Toggle split layout (i3: $mod+e for "layout toggle split")
bindd = SUPER, E, Toggle split layout, hy3:changegroup, toggletab

# Focus parent / child (i3: $mod+a for focus parent)
bindd = SUPER, A, Focus parent, hy3:changefocus, raise
bindd = SUPER SHIFT, A, Focus child, hy3:changefocus, lower

# Cycle through tabs in group (wrapping)
bindd = SUPER, TAB, Next tab, hy3:focustab, r, wrap
bindd = SUPER SHIFT, TAB, Previous tab, hy3:focustab, l, wrap

# Toggle tiling / floating (i3: $mod+Shift+space)
bindd = SUPER SHIFT, SPACE, Toggle floating, togglefloating,

# Change focus between tiling / floating windows (i3: $mod+space)
bindd = SUPER, SPACE, Focus toggle, exec, hyprctl dispatch focuswindow tiling || hyprctl dispatch focuswindow floating

# Window grouping / tabbed layout (i3: $mod+w for tabbed)
bindd = SUPER, W, Toggle tab group, hy3:makegroup, tab, toggle

# Scratchpad (i3: $mod+s; SUPER+ALT+S moves window to scratchpad)
# bindd = SUPER, S, Toggle scratchpad, togglespecialworkspace, scratchpad
# bindd = SUPER ALT, S, Move window to scratchpad, movetoworkspacesilent, special:scratchpad

# TODO: consider better keybindings for these
# Tiled fullscreen: window fills tile visually but stays in layout
bindd = SUPER CTRL, F, Tiled full screen, fullscreenstate, 0 2
# Pop window out: float + pin (visible on all workspaces, like PiP for any window)
bindd = SUPER, O, Pop window out (float & pin), exec, omarchy-hyprland-window-pop

# Cycle through windows on active workspace (like classic alt-tab)
bindd = ALT, TAB, Cycle to next window, cyclenext
bindd = ALT SHIFT, TAB, Cycle to prev window, cyclenext, prev
bindd = ALT, TAB, Reveal active window on top, bringactivetotop
bindd = ALT SHIFT, TAB, Reveal active window on top, bringactivetotop

# Move/resize windows with mouse
bindmd = SUPER, mouse:272, Move window, movewindow
bindmd = SUPER, mouse:273, Resize window, resizewindow


# =============================================================================
# Workspace Navigation (i3-style)
# =============================================================================

# Workspace selector (type a name to create/switch, or pick from list)
bindd = SUPER, S, Workspace selector, exec, omarchy-workspace-select

# Switch to workspace by number (i3: $mod+1-0)
bindd = SUPER, 1, Workspace 1, workspace, 1
bindd = SUPER, 2, Workspace 2, workspace, 2
bindd = SUPER, 3, Workspace 3, workspace, 3
bindd = SUPER, 4, Workspace 4, workspace, 4
bindd = SUPER, 5, Workspace 5, workspace, 5
bindd = SUPER, 6, Workspace 6, workspace, 6
bindd = SUPER, 7, Workspace 7, workspace, 7
bindd = SUPER, 8, Workspace 8, workspace, 8
bindd = SUPER, 9, Workspace 9, workspace, 9
bindd = SUPER, 0, Workspace 10, workspace, 10

# Move window to workspace, stay on current (i3: $mod+Shift+1-0)
bindd = SUPER SHIFT, 1, Move to workspace 1, movetoworkspacesilent, 1
bindd = SUPER SHIFT, 2, Move to workspace 2, movetoworkspacesilent, 2
bindd = SUPER SHIFT, 3, Move to workspace 3, movetoworkspacesilent, 3
bindd = SUPER SHIFT, 4, Move to workspace 4, movetoworkspacesilent, 4
bindd = SUPER SHIFT, 5, Move to workspace 5, movetoworkspacesilent, 5
bindd = SUPER SHIFT, 6, Move to workspace 6, movetoworkspacesilent, 6
bindd = SUPER SHIFT, 7, Move to workspace 7, movetoworkspacesilent, 7
bindd = SUPER SHIFT, 8, Move to workspace 8, movetoworkspacesilent, 8
bindd = SUPER SHIFT, 9, Move to workspace 9, movetoworkspacesilent, 9
bindd = SUPER SHIFT, 0, Move to workspace 10, movetoworkspacesilent, 10

# Back and forth (i3: $mod+z / $mod+Shift+z)
bindd = SUPER, Z, Former workspace, workspace, previous
bindd = SUPER SHIFT, Z, Move to former workspace, movetoworkspace, previous

# Next/prev workspace on output (i3: $mod+n/p)
bindd = SUPER, N, Next workspace, workspace, e+1
bindd = SUPER, P, Previous workspace, workspace, e-1

# Move window to next/prev workspace (i3: $mod+Shift+n/p)
bindd = SUPER SHIFT, N, Move to next workspace, movetoworkspace, e+1
bindd = SUPER SHIFT, P, Move to prev workspace, movetoworkspace, e-1

# Scroll through workspaces
bindd = SUPER, mouse_down, Scroll workspace forward, workspace, e+1
bindd = SUPER, mouse_up, Scroll workspace backward, workspace, e-1

# Move workspace to other monitor
bindd = SUPER SHIFT ALT, LEFT, Move workspace to left monitor, movecurrentworkspacetomonitor, l
bindd = SUPER SHIFT ALT, RIGHT, Move workspace to right monitor, movecurrentworkspacetomonitor, r
bindd = SUPER SHIFT ALT, UP, Move workspace to up monitor, movecurrentworkspacetomonitor, u
bindd = SUPER SHIFT ALT, DOWN, Move workspace to down monitor, movecurrentworkspacetomonitor, d

# Move workspace to other monitor (vim keys)
bindd = SUPER SHIFT CTRL, H, Move workspace to left monitor, movecurrentworkspacetomonitor, l
bindd = SUPER SHIFT CTRL, J, Move workspace to down monitor, movecurrentworkspacetomonitor, d
bindd = SUPER SHIFT CTRL, K, Move workspace to up monitor, movecurrentworkspacetomonitor, u
bindd = SUPER SHIFT CTRL, L, Move workspace to right monitor, movecurrentworkspacetomonitor, r


# =============================================================================
# Resize Mode (i3: $mod+r enters resize mode)
# =============================================================================

bindd = SUPER, R, Resize mode, submap, resize
submap = resize
bindd = , H, Shrink width, resizeactive, -50 0
bindd = , J, Grow height, resizeactive, 0 50
bindd = , K, Shrink height, resizeactive, 0 -50
bindd = , L, Grow width, resizeactive, 50 0
bindd = , LEFT, Shrink width, resizeactive, -50 0
bindd = , DOWN, Grow height, resizeactive, 0 50
bindd = , UP, Shrink height, resizeactive, 0 -50
bindd = , RIGHT, Grow width, resizeactive, 50 0
# Shift for larger resize steps
bindd = SHIFT, H, Shrink width (large), resizeactive, -150 0
bindd = SHIFT, J, Grow height (large), resizeactive, 0 150
bindd = SHIFT, K, Shrink height (large), resizeactive, 0 -150
bindd = SHIFT, L, Grow width (large), resizeactive, 150 0
bindd = SHIFT, LEFT, Shrink width (large), resizeactive, -150 0
bindd = SHIFT, DOWN, Grow height (large), resizeactive, 0 150
bindd = SHIFT, UP, Shrink height (large), resizeactive, 0 -150
bindd = SHIFT, RIGHT, Grow width (large), resizeactive, 150 0
bindd = , RETURN, Exit resize, submap, reset
bindd = , ESCAPE, Exit resize, submap, reset
submap = reset

# Resize outside of resize mode (Omarchy-style with -/= keys)
bindd = SUPER, code:20, Expand window left, resizeactive, -100 0    # - key
bindd = SUPER, code:21, Shrink window left, resizeactive, 100 0     # = key
bindd = SUPER SHIFT, code:20, Shrink window up, resizeactive, 0 -100
bindd = SUPER SHIFT, code:21, Expand window down, resizeactive, 0 100


# =============================================================================
# Clipboard
# =============================================================================

bindd = SUPER, C, Universal copy, sendshortcut, CTRL, Insert,
bindd = SUPER, V, Universal paste, sendshortcut, SHIFT, Insert,
bindd = SUPER, X, Universal cut, sendshortcut, CTRL, X,
bindd = SUPER ALT, C, Clipboard manager, exec, omarchy-launch-walker -m clipboard


# =============================================================================
# System Controls
# =============================================================================

# Lock screen (i3: $mod+Ctrl+l)
bindd = SUPER CTRL, L, Lock, exec, omarchy-lock-screen

# Reload config (i3: $mod+Shift+c)
bindd = SUPER SHIFT, C, Reload config, exec, hyprctl reload

# System / power menu
bindd = SUPER, ESCAPE, System menu, exec, omarchy-menu system
bindld = , XF86PowerOff, Power menu, exec, omarchy-menu system


# =============================================================================
# Menus & Launchers
# =============================================================================

bindd = SUPER CTRL, E, Emoji picker, exec, omarchy-launch-walker -m symbols
bindd = SUPER CTRL, C, Capture menu, exec, omarchy-menu capture
bindd = SUPER CTRL, O, Toggle menu, exec, omarchy-menu toggle
bindd = SUPER ALT, SPACE, Omarchy menu, exec, omarchy-menu
bindd = , XF86Calculator, Calculator, exec, gnome-calculator


# =============================================================================
# Aesthetics & Themes
# =============================================================================

bindd = SUPER CTRL, SPACE, Theme background menu, exec, omarchy-menu background
bindd = SUPER SHIFT CTRL, SPACE, Theme menu, exec, omarchy-menu theme


# =============================================================================
# Notifications
# =============================================================================

bindd = SUPER, COMMA, Dismiss last notification, exec, makoctl dismiss
bindd = SUPER SHIFT, COMMA, Dismiss all notifications, exec, makoctl dismiss --all
bindd = SUPER CTRL, COMMA, Toggle silencing notifications, exec, omarchy-toggle-notification-silencing
bindd = SUPER ALT, COMMA, Invoke last notification, exec, makoctl invoke
bindd = SUPER SHIFT ALT, COMMA, Restore last notification, exec, makoctl restore


# =============================================================================
# Toggles
# =============================================================================

bindd = SUPER CTRL, I, Toggle locking on idle, exec, omarchy-toggle-idle
bindd = SUPER CTRL, N, Toggle nightlight, exec, omarchy-toggle-nightlight


# =============================================================================
# Screenshots & Screen Recording
# =============================================================================

bindd = , PRINT, Screenshot, exec, omarchy-cmd-screenshot
bindd = ALT, PRINT, Screen recording, exec, omarchy-menu screenrecord
bindd = SUPER, PRINT, Color picker, exec, pkill hyprpicker || hyprpicker -a


# =============================================================================
# File Sharing
# =============================================================================

bindd = SUPER CTRL, S, Share, exec, omarchy-menu share


# =============================================================================
# Information
# =============================================================================

bindd = SUPER CTRL ALT, T, Show time, exec, notify-send -u low "    $(date +"%A %H:%M  ·  %d %B %Y  ·  Week %V")"
bindd = SUPER CTRL ALT, B, Show battery remaining, exec, notify-send -u low "$(omarchy-battery-status)"


# =============================================================================
# Control Panels
# =============================================================================

bindd = SUPER CTRL, A, Audio controls, exec, omarchy-launch-audio
bindd = SUPER CTRL, B, Bluetooth controls, exec, omarchy-launch-bluetooth
bindd = SUPER CTRL, W, Wifi controls, exec, omarchy-launch-wifi
bindd = SUPER CTRL, T, Activity, exec, omarchy-launch-tui btop


# =============================================================================
# Dictation
# =============================================================================

bindd = SUPER CTRL, X, Toggle dictation, exec, voxtype record toggle


# =============================================================================
# Zoom
# =============================================================================

bindd = SUPER CTRL, Z, Zoom in, exec, hyprctl keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor -j | jq '.float + 1')
bindd = SUPER CTRL ALT, Z, Reset zoom, exec, hyprctl keyword cursor:zoom_factor 1


# =============================================================================
# Media Keys
# =============================================================================

# Volume and brightness (with OSD)
bindeld = ,XF86AudioRaiseVolume, Volume up, exec, $osdclient --output-volume raise
bindeld = ,XF86AudioLowerVolume, Volume down, exec, $osdclient --output-volume lower
bindeld = ,XF86AudioMute, Mute, exec, $osdclient --output-volume mute-toggle
bindeld = ,XF86AudioMicMute, Mute microphone, exec, $osdclient --input-volume mute-toggle
bindeld = ,XF86MonBrightnessUp, Brightness up, exec, omarchy-brightness-display +5%
bindeld = ,XF86MonBrightnessDown, Brightness down, exec, omarchy-brightness-display 5%-
bindeld = ,XF86KbdBrightnessUp, Keyboard brightness up, exec, omarchy-brightness-keyboard up
bindeld = ,XF86KbdBrightnessDown, Keyboard brightness down, exec, omarchy-brightness-keyboard down
bindld = ,XF86KbdLightOnOff, Keyboard backlight cycle, exec, omarchy-brightness-keyboard cycle

# Precise 1% multimedia adjustments with Alt modifier
bindeld = ALT, XF86AudioRaiseVolume, Volume up precise, exec, $osdclient --output-volume +1
bindeld = ALT, XF86AudioLowerVolume, Volume down precise, exec, $osdclient --output-volume -1
bindeld = ALT, XF86MonBrightnessUp, Brightness up precise, exec, omarchy-brightness-display +1%
bindeld = ALT, XF86MonBrightnessDown, Brightness down precise, exec, omarchy-brightness-display 1%-

# Media controls (requires playerctl)
bindld = , XF86AudioNext, Next track, exec, $osdclient --playerctl next
bindld = , XF86AudioPause, Pause, exec, $osdclient --playerctl play-pause
bindld = , XF86AudioPlay, Play, exec, $osdclient --playerctl play-pause
bindld = , XF86AudioPrev, Previous track, exec, $osdclient --playerctl previous

# Switch audio output
bindld = SUPER, XF86AudioMute, Switch audio output, exec, omarchy-cmd-audio-switch

# Apple Display brightness
bindd = CTRL, F1, Apple Display brightness down, exec, omarchy-brightness-display-apple -5000
bindd = CTRL, F2, Apple Display brightness up, exec, omarchy-brightness-display-apple +5000
bindd = SHIFT CTRL, F2, Apple Display full brightness, exec, omarchy-brightness-display-apple +60000

# TEMP
bindd = SUPER, Slash, Cycle monitor scaling, exec, omarchy-hyprland-monitor-scaling-cycle
