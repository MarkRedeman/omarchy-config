# Change the default Omarchy look'n'feel

# https://wiki.hyprland.org/Configuring/Variables/#general
general {
    # No gaps between windows or borders
    gaps_in = 0
    gaps_out = 0
    border_size = 0

    # Use hy3 layout instead of dwindle/master
    layout = hy3
}

# https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
    # Use round window corners
    # rounding = 8
    # inactive_opacity is not used; dim_inactive provides a subtler effect
    dim_inactive = true
    dim_strength = 0.1
}

# https://wiki.hyprland.org/Configuring/Variables/#binds
binds {
    # Pressing SUPER+3 while already on workspace 3 goes back to previous workspace
    workspace_back_and_forth = true
}

# https://wiki.hyprland.org/Configuring/Variables/#layout
layout {
    # Avoid overly wide single-window layouts on wide screens
    # single_window_aspect_ratio = 1 1
}
