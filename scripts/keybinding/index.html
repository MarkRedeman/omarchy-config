<!DOCTYPE HTML>
<html>
<head>
    <meta charset="utf-8">
    <title>Hyprland Keybinding Visualizer</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-[#07070B] text-[#f0dbcf] antialiased" style="font-family: 'FiraCode Nerd Font', 'JetBrains Mono', monospace;">
    <header class="border-b border-[#353543] bg-[#07070B]/95 px-4 py-4 backdrop-blur-sm">
        <h1 class="text-2xl font-bold tracking-tight">Hyprland Keybinding Visualizer</h1>
        <div class="mt-3 flex flex-wrap items-center gap-3">
            <input type="text" id="search" placeholder="Search descriptions..." class="w-full max-w-xs border border-[#353543] bg-[#0d0d14] px-3 py-2 text-sm text-[#f0dbcf] placeholder:text-[#9a9dbc] focus:outline-none focus:ring-2 focus:ring-[#9a9dbc]/70">
            <button id="clear" class="border border-[#353543] bg-[#151523] px-4 py-2 text-sm font-semibold text-[#f0dbcf] transition hover:bg-[#1c1c2c] focus:outline-none focus:ring-2 focus:ring-[#9a9dbc]/70">Clear Selection</button>
        </div>
    </header>
    <main class="flex min-h-[calc(100vh-64px)] flex-col gap-4 bg-[radial-gradient(circle_at_top_right,_rgba(154,157,188,0.12),_transparent_40%),radial-gradient(circle_at_20%_30%,_rgba(53,53,67,0.35),_transparent_45%)] p-4 lg:flex-row lg:gap-6">
        <div class="keyboard flex-1" id="keyboard">
            <!-- Keyboard will be generated by JS -->
        </div>
        <div id="bindings" class="bindings min-w-[250px] border border-[#353543] bg-[#0b0b10]/95 lg:w-[40%]">
            <h2 class="border-b border-[#353543] px-3 py-2 text-lg font-bold" id="bindings-header">Keybindings</h2>
            <div id="bindings-list" class="max-h-[70vh] overflow-auto">
                <!-- Bindings will be generated by JS -->
            </div>
        </div>
    </main>
    <script src="keyboard.js"></script>
</body>
</html>
