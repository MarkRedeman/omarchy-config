<!DOCTYPE HTML>
<html>
<head>
    <meta charset="utf-8">
    <title>Hyprland Keybinding Visualizer</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    <header class="bg-gray-800 text-white p-4">
        <h1 class="text-2xl font-bold">Hyprland Keybinding Visualizer</h1>
        <div class="flex flex-wrap items-center mt-2 gap-3">
            <input type="text" id="search" placeholder="Search descriptions..." class="border border-gray-300 rounded px-3 py-2 w-full max-w-xs focus:outline-none focus:ring-2 focus:ring-blue-500">
            <button id="clear" class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2">Clear Selection</button>
        </div>
    </header>
    <main class="flex flex-col lg:flex-row min-h-[calc(100vh-60px)] p-4 gap-6">
        <div class="keyboard flex-1" id="keyboard">
            <!-- Keyboard will be generated by JS -->
        </div>
        <div id="bindings" class="bindings lg:w-[40%] min-w-[250px] bg-white border border-gray-200 rounded">
            <h2 class="text-xl font-bold px-3 py-2 border-b border-gray-200" id="bindings-header">Keybindings</h2>
            <div id="bindings-list" class="max-h-[70vh] overflow-auto">
                <!-- Bindings will be generated by JS -->
            </div>
        </div>
    </main>
    <script src="keyboard.js"></script>
</body>
</html>
