<!DOCTYPE HTML>
<html>
<head>
    <meta charset="utf-8">
    <title>Hyprland Keybinding Visualizer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #bindings-list {
            scrollbar-color: #353543 #0b0b10;
            scrollbar-width: thin;
            -webkit-overflow-scrolling: touch;
            touch-action: pan-y;
        }

        #clear {
            border: 1px solid #353543;
            background: #151523;
            box-shadow: none;
        }

        #clear:hover {
            background: #1c1c2c;
        }

        #clear.is-active {
            border-color: #c09dc8;
            background: #27203a;
            box-shadow: 0 0 0 1px rgba(192, 157, 200, 0.25);
        }

        #clear.is-active:hover {
            background: #32284a;
            box-shadow: 0 0 0 1px rgba(192, 157, 200, 0.45), 0 0 18px rgba(192, 157, 200, 0.2);
        }

        #bindings-list::-webkit-scrollbar {
            width: 10px;
        }

        #bindings-list::-webkit-scrollbar-track {
            background: #0b0b10;
        }

        #bindings-list::-webkit-scrollbar-thumb {
            background: #353543;
            border: 2px solid #0b0b10;
        }

        #bindings-list::-webkit-scrollbar-thumb:hover {
            background: #9a9dbc;
        }
    </style>
</head>
<body class="flex h-[100dvh] flex-col overflow-hidden bg-[#07070B] text-[#f0dbcf] antialiased" style="font-family: 'FiraCode Nerd Font', 'JetBrains Mono', monospace;">
    <header class="border-b border-[#353543] bg-[#07070B]/95 px-4 py-3 backdrop-blur-sm">
        <div class="flex flex-col gap-2 sm:flex-row sm:items-center sm:justify-between">
            <h1 class="text-xl font-bold tracking-tight">Hyprland Keybinding Visualizer</h1>
            <button id="clear" class="w-fit whitespace-nowrap px-3 py-1.5 text-xs font-semibold text-[#f0dbcf] transition focus:outline-none focus:ring-2 focus:ring-[#c09dc8]/70">Clear Selection</button>
        </div>
    </header>
    <main class="flex min-h-0 flex-1 flex-col gap-4 overflow-hidden bg-[radial-gradient(circle_at_top_right,_rgba(154,157,188,0.12),_transparent_40%),radial-gradient(circle_at_20%_30%,_rgba(53,53,67,0.35),_transparent_45%)] p-3 sm:p-4 lg:flex-row lg:gap-6">
        <div class="flex min-h-0 flex-1 flex-col gap-3 lg:min-w-0">
            <div class="keyboard overflow-x-auto overflow-y-hidden pb-1" id="keyboard">
                <!-- Keyboard will be generated by JS -->
            </div>
            <div class="border border-[#353543] bg-[#0b0b10]/95 px-3 py-2 text-xs text-[#9a9dbc]">
                Generate bindings JSON with <code class="text-[#f0dbcf]">cd scripts/keybinding && python3 export_keybindings.py</code>.
                The exporter reads <code class="text-[#f0dbcf]">hyprctl binds -j</code> when Hyprland is running and falls back to your
                local Hypr config if runtime data is unavailable.
            </div>
        </div>
        <div id="bindings" class="bindings flex min-h-0 h-[48vh] min-w-[250px] flex-col overflow-hidden border border-[#353543] bg-[#0b0b10]/95 lg:h-full lg:w-[40%]">
            <div class="flex flex-col gap-2 border-b border-[#353543] px-3 py-2 sm:flex-row sm:items-center sm:justify-between">
                <h2 class="text-lg font-bold" id="bindings-header">Keybindings</h2>
                <input type="text" id="search" placeholder="Search descriptions..." class="w-full border border-[#353543] bg-[#0d0d14] px-3 py-1.5 text-sm text-[#f0dbcf] placeholder:text-[#9a9dbc] focus:outline-none focus:ring-2 focus:ring-[#9a9dbc]/70 sm:max-w-xs">
            </div>
            <div id="bindings-list" class="min-h-0 flex-1 overflow-y-auto">
                <!-- Bindings will be generated by JS -->
            </div>
        </div>
    </main>
    <script src="keyboard.js"></script>
</body>
</html>
