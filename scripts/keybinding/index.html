<!DOCTYPE HTML>
<html>
<head>
    <meta charset="utf-8">
    <title>Hyprland Keybinding Visualizer</title>
    <link rel="stylesheet" href="keyboard.css">
</head>
<body>
    <header>
        <h1>Hyprland Keybinding Visualizer</h1>
        <div class="controls">
            <input type="text" id="search" placeholder="Search descriptions...">
            <button id="clear">Clear Selection</button>
        </div>
    </header>
    <main>
        <div class="keyboard" id="keyboard">
            <!-- Keyboard will be generated by JS -->
        </div>
        <div class="bindings" id="bindings">
            <h2>Keybindings</h2>
            <div id="bindings-list">
                <!-- Bindings will be generated by JS -->
            </div>
        </div>
    </main>
    <script src="keyboard.js"></script>
</body>
</html>
