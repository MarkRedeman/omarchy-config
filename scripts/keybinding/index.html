<!DOCTYPE HTML>
<html>
<head>
    <meta charset="utf-8">
    <title>Hyprland Keybinding Visualizer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #bindings-list {
            scrollbar-color: #353543 #0b0b10;
            scrollbar-width: thin;
        }

        #clear {
            border: 1px solid #353543;
            background: #151523;
            box-shadow: none;
        }

        #clear:hover {
            background: #1c1c2c;
        }

        #clear.is-active {
            border-color: #c09dc8;
            background: #27203a;
            box-shadow: 0 0 0 1px rgba(192, 157, 200, 0.25);
        }

        #clear.is-active:hover {
            background: #32284a;
            box-shadow: 0 0 0 1px rgba(192, 157, 200, 0.45), 0 0 18px rgba(192, 157, 200, 0.2);
        }

        #bindings-list::-webkit-scrollbar {
            width: 10px;
        }

        #bindings-list::-webkit-scrollbar-track {
            background: #0b0b10;
        }

        #bindings-list::-webkit-scrollbar-thumb {
            background: #353543;
            border: 2px solid #0b0b10;
        }

        #bindings-list::-webkit-scrollbar-thumb:hover {
            background: #9a9dbc;
        }
    </style>
</head>
<body class="h-screen overflow-hidden bg-[#07070B] text-[#f0dbcf] antialiased" style="font-family: 'FiraCode Nerd Font', 'JetBrains Mono', monospace;">
    <header class="border-b border-[#353543] bg-[#07070B]/95 px-4 py-3 backdrop-blur-sm">
        <div class="flex items-center justify-between gap-4">
            <h1 class="text-xl font-bold tracking-tight">Hyprland Keybinding Visualizer</h1>
            <button id="clear" class="whitespace-nowrap px-3 py-1.5 text-xs font-semibold text-[#f0dbcf] transition focus:outline-none focus:ring-2 focus:ring-[#c09dc8]/70">Clear Selection</button>
        </div>
    </header>
    <main class="flex h-[calc(100vh-57px)] min-h-0 flex-col gap-4 overflow-hidden bg-[radial-gradient(circle_at_top_right,_rgba(154,157,188,0.12),_transparent_40%),radial-gradient(circle_at_20%_30%,_rgba(53,53,67,0.35),_transparent_45%)] p-4 lg:flex-row lg:gap-6">
        <div class="keyboard flex-1" id="keyboard">
            <!-- Keyboard will be generated by JS -->
        </div>
        <div id="bindings" class="bindings min-w-[250px] border border-[#353543] bg-[#0b0b10]/95 lg:flex lg:h-full lg:w-[40%] lg:flex-col">
            <div class="flex items-center justify-between gap-3 border-b border-[#353543] px-3 py-2">
                <h2 class="text-lg font-bold" id="bindings-header">Keybindings</h2>
                <input type="text" id="search" placeholder="Search descriptions..." class="w-full max-w-xs border border-[#353543] bg-[#0d0d14] px-3 py-1.5 text-sm text-[#f0dbcf] placeholder:text-[#9a9dbc] focus:outline-none focus:ring-2 focus:ring-[#9a9dbc]/70">
            </div>
            <div id="bindings-list" class="max-h-[70vh] overflow-y-auto lg:max-h-none lg:min-h-0 lg:flex-1">
                <!-- Bindings will be generated by JS -->
            </div>
        </div>
    </main>
    <script src="keyboard.js"></script>
</body>
</html>
